<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bookmarklet of Destiny</title><style>:host{all:initial;display:block;width:100%;height:100%;contain:layout style paint}
:host,:root{color-scheme:dark;--bg:#020704;--panel:#06110bbd;--panel2:#091a10;--line:#174c2b;--green:#39ff88;--green2:#9affbd;--muted:#669276;--danger:#ff5577;--amber:#ffd166;--cyan:#5ee7ff;--glow:0 0 22px #00ff6630;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
*{box-sizing:border-box}html,body,#app{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--green2)}#app{position:relative;container-type:inline-size;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
button,input,textarea,select{font:inherit}button{color:var(--green2);background:#08170d;border:1px solid var(--line);padding:9px 12px;cursor:pointer}button:hover,button:focus-visible{border-color:var(--green);background:#0c2615;outline:none;box-shadow:var(--glow)}button.danger{border-color:#73253a;color:#ff8ba2}button.primary{border-color:var(--green);color:#d5ffe2}input,textarea,select{width:100%;color:#d7ffe3;background:#030906;border:1px solid var(--line);padding:10px;outline:none}input:focus,textarea:focus,select:focus{border-color:var(--green);box-shadow:var(--glow)}textarea{resize:vertical;min-height:120px}
select{appearance:none;min-height:42px;padding:9px 42px 9px 12px;color:var(--green2);background-color:#06130b;background-image:linear-gradient(45deg,transparent 50%,var(--green) 50%),linear-gradient(135deg,var(--green) 50%,transparent 50%),linear-gradient(90deg,#174c2b,#174c2b);background-position:calc(100% - 17px) 17px,calc(100% - 11px) 17px,calc(100% - 35px) 0;background-size:6px 6px,6px 6px,1px 100%;background-repeat:no-repeat;border-color:#23683a;box-shadow:inset 0 0 18px #00ff6608;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
select:hover{border-color:#39ff88;background-color:#0a2113;box-shadow:0 0 15px #00ff6624,inset 0 0 18px #00ff6610}
select:focus-visible{outline:2px solid #39ff88;outline-offset:2px;border-color:#39ff88;box-shadow:var(--glow)}
select:disabled{cursor:not-allowed;color:#52705b;background-color:#050b07;border-color:#183121;opacity:.65}
select option{color:#caffd9;background:#06130b}
.select-compact{width:min(180px,100%);min-width:150px;max-width:100%}.select-full{width:100%}.select-field{display:grid;gap:6px;min-width:0}.select-label{color:var(--green);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
.matrix{position:absolute;inset:0;width:100%;height:100%;opacity:.58;filter:contrast(1.2) saturate(1.25);pointer-events:none}.shell{position:relative;z-index:1;display:grid;grid-template-columns:250px 1fr;width:100%;height:100%;min-height:0;overflow:hidden;background:linear-gradient(90deg,#020704c2,#02070478)}
.sidebar{display:flex;min-height:0;flex-direction:column;border-right:1px solid var(--line);background:#020704c9;padding:18px 12px}.brand{padding:7px 9px 19px;border-bottom:1px solid var(--line)}.brand b{display:block;color:var(--green);font-size:17px;letter-spacing:.08em;text-shadow:0 0 14px #00ff66}.brand small{color:var(--muted)}
.search{margin:13px 0}.nav{overflow:auto;display:flex;flex-direction:column;gap:3px}.nav button{text-align:left;border-color:transparent;background:transparent;color:#74ad86}.nav button.active{border-color:var(--line);background:#0a2113;color:var(--green);box-shadow:inset 3px 0 var(--green)}.nav button span{display:inline-block;width:23px;color:#3fe97d}.sidebar-foot{margin-top:auto;padding:14px 8px 2px;color:var(--muted);font-size:11px}
.main{min-width:0;min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);overflow:hidden}.topbar{height:58px;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--line);background:#030b07c4;cursor:move;user-select:none}.topbar h1{font-size:14px;letter-spacing:.12em;margin:0;color:var(--green)}.topbar .spacer{flex:1}.clock{color:#70b687;font-size:12px}.iconbtn{padding:7px 10px;cursor:pointer}
.content{min-width:0;min-height:0;overflow:auto;overscroll-behavior:contain;scrollbar-gutter:stable;padding:20px}.page{width:100%;min-width:0;max-width:1200px;margin:0 auto}.page-head{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:18px}.page-head h2{margin:0;color:var(--green);font-size:24px}.page-head p{margin:4px 0 0;color:var(--muted)}.terminal-tag{color:#54ac70;font-size:12px}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{grid-column:span 6;border:1px solid var(--line);background:var(--panel);padding:16px;box-shadow:inset 0 0 35px #00ff6608}.card.full{grid-column:1/-1}.card.third{grid-column:span 4}.card h3{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--green);margin:0 0 13px}.row{display:flex;gap:9px;align-items:center}.row.wrap{flex-wrap:wrap}.stack{display:grid;gap:10px}.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}.metric{font-size:30px;color:#e1ffe9}.muted{color:var(--muted)}.tiny{font-size:11px}.output{min-height:42px;border:1px solid #103820;background:#020604;padding:11px;white-space:pre-wrap;word-break:break-word}.list{display:grid;gap:7px;max-height:260px;overflow:auto}.item{display:flex;align-items:center;gap:8px;border-bottom:1px solid #10351e;padding:7px 0}.item .grow{flex:1}.done{text-decoration:line-through;color:#51715b}
.calc-display{font-size:25px;text-align:right}.keys{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}.keys button{min-height:42px}.history{font-size:12px;color:#78ad88;max-height:180px;overflow:auto}.history div{padding:5px;border-bottom:1px solid #11371f}.timer-display{font-size:44px;text-align:center;color:#d7ffe3;text-shadow:0 0 20px #00ff66}.tabs{display:flex;gap:6px;margin-bottom:12px}.tabs button.active{border-color:var(--green);color:var(--green)}
.game-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}.game-tabs button.active{border-color:var(--green);background:#0b2b17}.game-wrap{display:grid;place-items:center;min-height:440px;max-width:100%;overflow:auto;border:1px solid var(--line);background:#010402;padding:12px}.game-canvas{width:min(100%,720px);height:auto;max-height:520px;image-rendering:auto;outline:none}.game-status{display:flex;justify-content:space-between;width:min(100%,720px);min-width:max-content;margin:0 auto 10px;color:#75b889}
.ttt{display:grid;grid-template-columns:repeat(3,100px);gap:6px}.ttt button{width:100px;height:100px;font-size:43px}.mine-grid{display:grid;gap:2px}.mine-grid button{width:30px;height:30px;padding:0;font-size:12px}.mine-grid button.open{background:#10271a;color:#c7ffd8}.mine-grid button.flag{color:var(--amber)}
.drawing{width:100%;height:360px;background:#f5fff8;cursor:crosshair;touch-action:none}.qr-output{display:grid;place-items:center;min-height:220px;background:white;padding:12px}.qr-output img{max-width:220px;width:100%;image-rendering:pixelated}
.palette{position:fixed;z-index:20;inset:0;background:#000b;display:grid;place-items:start center;padding-top:12vh}.palette-box{width:min(620px,90vw);border:1px solid var(--green);background:#031008;padding:12px;box-shadow:0 0 80px #00ff6645}.palette-results{display:grid;margin-top:8px;max-height:45vh;overflow:auto}.palette-results button{text-align:left;border-color:transparent}.hidden{display:none!important}.toast{position:fixed;z-index:30;right:18px;bottom:18px;border:1px solid var(--green);background:#04150a;padding:12px 16px;box-shadow:var(--glow)}
.resize-handle{position:absolute;z-index:40;right:2px;bottom:2px;width:18px;height:18px;cursor:nwse-resize;background:linear-gradient(135deg,transparent 0 45%,var(--green) 46% 53%,transparent 54% 64%,var(--green) 65% 72%,transparent 73%);opacity:.8}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{border:1px solid var(--line);padding:12px}.stat b{display:block;font-size:25px;color:var(--green)}kbd{border:1px solid #34724a;background:#07160c;padding:2px 6px;color:#b7ffcc}
